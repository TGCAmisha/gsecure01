<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>News Room | G'Secure Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{orange:'#faa61a',orangeSoft:'#ffd07a',deep:'#004a80',bright:'#0077d0',ink:'#0a0c10',surface:'#11141a',surface2:'#161a22',mute:'#6a7280',body:'#c6c8ca'}},fontFamily:{sans:['Roboto'],mono:['"Roboto Mono"']}}}}</script>
<link rel="stylesheet" href="assets/style.css">
</head><body class="overflow-x-hidden">
<div id="nav-mount"></div>
<section class="relative pt-12 pb-16 overflow-hidden"><div class="absolute inset-0 grid-mask"></div><div class="orb orb-orange drift1" style="width:420px;height:420px;top:-80px;right:-60px"></div>
  <div class="relative max-w-7xl mx-auto px-6">
    <div class="text-[12px] text-brand-mute font-mono mb-6 reveal"><a href="index.html" class="hover:text-brand-orange">Home</a> / <span class="text-brand-orange">News Room</span></div>
    <div class="eyebrow text-brand-orange mb-5 reveal">Press & Announcements</div>
    <h1 class="h-mega text-white max-w-3xl reveal">Latest <span class="grad-text">company news</span>.</h1>
  </div>
</section>
<section class="relative py-16 border-t border-white/5"><div class="max-w-7xl mx-auto px-6">
  <div class="grid md:grid-cols-2 gap-5" id="grid"></div>
</div></section>
<div id="cta-mount"></div><div id="footer-mount"></div>
<script src="assets/app.js"></script>
<script>
const NEWS=[
  ['Press Release','May 02, 2026',"G'Secure Labs Opens New SOC in Reykjavik","Expanding 24×7 coverage across Northern Europe with a new Tier-3 staffed facility."],
  ['Award','Apr 18, 2026','Recognized as Top European MDR Provider','Independent analyst firm names G\'Secure among the top 10 European MDR providers for 2026.'],
  ['Partnership','Mar 22, 2026','Strategic Alliance with Recorded Future','Deepening threat-intelligence integration across all MDR engagements.'],
  ['Press Release','Feb 12, 2026','100th Enterprise Customer Onboarded','Reaching a milestone after 27 years of operation, now serving customers across 30 countries.'],
  ['Event','Jan 20, 2026','Speaking at RSA Conference 2026','Senior leadership presenting on resilience-driven SOC architecture.'],
  ['Award','Dec 15, 2025','ISO 27001:2022 Recertification','Successfully recertified under the latest ISO information security standard.'],
];
document.getElementById('grid').innerHTML = NEWS.map(([tag,date,title,excerpt])=>`
  <a href="#" class="card p-7 reveal block">
    <div class="flex items-center gap-3 mb-4"><span class="chip text-brand-orange border-brand-orange/30">${tag}</span><span class="text-brand-mute text-xs font-mono">${date}</span></div>
    <h3 class="text-white font-bold text-xl leading-snug">${title}</h3>
    <p class="text-brand-body text-[14px] mt-3">${excerpt}</p>
    <span class="mt-5 inline-flex items-center gap-1 text-brand-orange text-[13px] font-semibold">Read More →</span>
  </a>`).join('');
mountChrome('news-room.html');
</script>
</body></html>
