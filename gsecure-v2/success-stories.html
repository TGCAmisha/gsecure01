<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Success Stories | G'Secure Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{orange:'#faa61a',orangeSoft:'#ffd07a',deep:'#004a80',bright:'#0077d0',ink:'#0a0c10',surface:'#11141a',surface2:'#161a22',mute:'#6a7280',body:'#c6c8ca'}},fontFamily:{sans:['Roboto'],mono:['"Roboto Mono"']}}}}</script>
<link rel="stylesheet" href="assets/style.css">
</head><body class="overflow-x-hidden">
<div id="nav-mount"></div>
<section class="relative pt-12 pb-16 overflow-hidden">
  <div class="absolute inset-0 grid-mask"></div>
  <div class="orb orb-orange drift1" style="width:420px;height:420px;top:-80px;right:-60px"></div>
  <div class="relative max-w-7xl mx-auto px-6">
    <div class="text-[12px] text-brand-mute font-mono mb-6 reveal"><a href="index.html" class="hover:text-brand-orange">Home</a> / <span class="text-brand-orange">Success Stories</span></div>
    <div class="eyebrow text-brand-orange mb-5 reveal">Case Studies</div>
    <h1 class="h-mega text-white max-w-3xl reveal">Real outcomes, <span class="grad-text">real enterprises</span>.</h1>
  </div>
</section>
<section class="relative py-16 border-t border-white/5"><div class="max-w-7xl mx-auto px-6">
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5" id="grid"></div>
</div></section>
<div id="cta-mount"></div>
<div id="footer-mount"></div>
<script src="assets/app.js"></script>
<script>
const STORIES=[
  ['MDR','Comprehensive Cybersecurity for a Leading Sports Organization','24×7 detection across hybrid cloud, identity, and IoT venues — reduced dwell time by 92%.','from-brand-deep via-brand-bright/40 to-brand-orange/40'],
  ['EDR','Preventing Breaches via Cloud-Delivered Platform','Endpoint resilience for a global MEP services company — 8,000 endpoints under management.','from-brand-bright/30 via-brand-deep to-brand-orange/30'],
  ['GRC','IT Security & Infrastructure Audit','Compliance hardening for a mechanical-parts manufacturer — passed first-time ISO 27001 audit.','from-brand-orange/40 via-brand-deep to-brand-bright/30'],
  ['Threat Intel','Multi-Layered Approach for a Telecom Leader','Operationalized threat intel across SOC, IR and risk teams — 40% reduction in mean detection time.','from-brand-deep via-brand-bright/40 to-brand-orange/30'],
  ['SOC','24×7 Operations for a European Logistics Group','Migrated from in-house SOC to managed model — 60% cost reduction, 3× analyst seniority.','from-brand-bright/40 via-brand-deep to-brand-orange/30'],
  ['VAPT','Annual Pen-Test Program for a Nordic Bank','Continuous attack-surface testing — 14 critical findings remediated pre-disclosure.','from-brand-orange/30 via-brand-deep to-brand-bright/40'],
  ['NDR','Lateral-Movement Detection for a Healthcare Network','Network-layer visibility caught a stealthy intruder traditional EDR missed.','from-brand-deep via-brand-orange/30 to-brand-bright/40'],
  ['Forensics','Ransomware IR for a Manufacturing Customer','24-hour mobilization, full recovery in 6 days, no ransom paid.','from-brand-bright/30 via-brand-orange/30 to-brand-deep'],
  ['UEBA','Insider Threat Program for a SaaS Provider','Behavioral analytics surfaced a privileged-access abuse pattern — saved IP worth millions.','from-brand-orange/30 via-brand-bright/40 to-brand-deep'],
];
document.getElementById('grid').innerHTML = STORIES.map(([tag,title,excerpt,grad])=>`
  <a href="#" class="card overflow-hidden reveal block">
    <div class="aspect-[16/10] bg-gradient-to-br ${grad} grid place-items-center"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg></div>
    <div class="p-5"><span class="chip text-brand-orange border-brand-orange/30 mb-3">${tag}</span><h3 class="text-white font-bold mt-3 leading-snug">${title}</h3><p class="text-brand-mute text-[13px] mt-2">${excerpt}</p><span class="mt-4 inline-flex items-center gap-1 text-brand-orange text-[13px] font-semibold">Read Case Study →</span></div>
  </a>`).join('');
mountChrome('success-stories.html');
</script>
</body></html>
