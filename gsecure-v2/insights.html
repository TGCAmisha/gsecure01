<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{orange:'#faa61a',orangeSoft:'#ffd07a',deep:'#004a80',bright:'#0077d0',ink:'#0a0c10',surface:'#11141a',surface2:'#161a22',mute:'#6a7280',body:'#c6c8ca'}},fontFamily:{sans:['Roboto'],mono:['"Roboto Mono"']}}}}</script>
<link rel="stylesheet" href="assets/style.css">
</head><body class="overflow-x-hidden">
<div id="nav-mount"></div>
<section class="relative pt-12 pb-16 overflow-hidden">

  <div class="relative max-w-7xl mx-auto px-6">
    <div class="text-[12px] text-brand-mute font-mono mb-6 reveal"><a href="index.html" class="hover:text-brand-orange">Home</a> / <span class="text-brand-orange">Insights</span></div>

    <h1 class="h-mega text-white max-w-3xl reveal">From the <span class="grad-text">G'Secure team</span>.</h1>
    <p class="mt-6 text-brand-body max-w-2xl reveal">Field-tested perspectives on security, compliance, and the operating reality of defending modern enterprises.</p>
  </div>
</section>
<section class="relative py-16 border-t border-white/5"><div class="max-w-7xl mx-auto px-6">
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5" id="grid"></div>
</div></section>
<div id="cta-mount"></div>
<div id="footer-mount"></div>
<script src="assets/app.js"></script>
<script>
const POSTS=[
  ['Article','Apr 22, 2026','Engineering for Security & Compliance by Design','How modern platform teams bake controls into the SDLC instead of bolting them on.'],
  ['Blog','Mar 14, 2026','Building Secure, Compliant Systems in Regulated European Environments','A practical lens on DORA, NIS2, and what enterprise CISOs are prioritizing right now.'],
  ['Article','Feb 02, 2026','Cyber Resilience vs. Cyber Defense: What Leaders Should Prioritize','Why resilience — not perimeter hardening — is the differentiator in 2026.'],
  ['Blog','Jan 19, 2026','MITRE ATT&CK as an Operating Manual','Moving from ATT&CK as a checklist to ATT&CK as a daily operating model.'],
  ['Article','Dec 04, 2025','The Identity Security Inflection Point','Why identity is now the primary attack surface — and what to do about it.'],
  ['Blog','Nov 11, 2025','Threat Hunting on a Budget','Pragmatic hunts your team can run with the telemetry you already have.'],
  ['Article','Oct 02, 2025','SOC Metrics That Actually Matter','Killing vanity metrics — and the small set of numbers worth tracking.'],
  ['Blog','Sep 14, 2025','Pen Testing in the Age of AI','How offensive teams are integrating LLMs — and why defenders should care.'],
  ['Article','Aug 21, 2025','Compliance as Code','Treating GRC artifacts the way platform teams treat infrastructure.'],

document.getElementById('grid').innerHTML = POSTS.map(([tag,date,title,excerpt])=>`
  <a href="#" class="card p-6 reveal block">
    <div class="flex items-center gap-3 mb-4"><span class="chip">${tag}</span><span class="text-brand-mute text-xs font-mono">${date}</span></div>
    <h3 class="text-white font-bold text-lg leading-snug">${title}</h3>
    <p class="text-brand-mute text-[13.5px] mt-2">${excerpt}</p>
    <span class="mt-5 inline-flex items-center gap-1 text-brand-orange text-[13px] font-semibold">Read More →</span>
  </a>`).join('');
mountChrome('insights.html');
</script>
