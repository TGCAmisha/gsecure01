const ARTICLES = {
  'engineering-secure': {
    tag:'Article', date:'Apr 22, 2026', read:'7 min', author:['Umesh Singh Rajput','Head of Engineering'],
    title:'Engineering for Security & Compliance by Design',
    lede:'How modern platform teams bake security and audit-grade evidence into the SDLC, instead of bolting them on after the fact.',
    cover:'https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1600&q=80',
    tags:['#sdlc','#shift-left','#platform-engineering','#compliance'],
    body:`
      <p>The phrase "shift left" has been around long enough to be meaningless to most teams. The platform groups that actually pull it off do not just move scanners earlier in the pipeline. They redesign the developer experience so that the secure path is also the easiest path.</p>
      <h2>Three habits of platform teams that get this right</h2>
      <h3>1. They make the paved road compliant by default</h3>
      <p>The starter template for a new service includes hardened CI, signed builds, SBOM emission, secrets management, and audit-grade logging — all wired up before the developer writes a line of business code. The compliance team reviews the template, not every service.</p>
      <h3>2. They treat policy as code, in the same repo as the workload</h3>
      <p>Open Policy Agent, Conftest, or equivalent. Policies live next to the code they govern. Pull requests fail on policy violations the same way they fail on broken tests. There is no "compliance review" step three weeks later.</p>
      <h3>3. They generate evidence as a byproduct of normal operations</h3>
      <p>Every deploy emits a structured event. Every change ticket links to the deploy. Every alert links to the change. When the auditor asks "show me how change X was approved and tested," the answer is a query, not an archaeology project.</p>
      <blockquote>The most secure systems are not the ones with the most controls. They are the ones where the controls are invisible to the developer doing the right thing.</blockquote>
      <h2>What to ship first if you are starting</h2>
      <ol>
        <li>A signed-and-attested CI pipeline template that every new service inherits.</li>
        <li>A policy-as-code gate that blocks the top three findings your auditors flag.</li>
        <li>A logging contract so every service emits the same structured deploy and access events.</li>
      </ol>
      <p>You will not be done in a quarter. But you will have removed the three biggest friction points between engineering velocity and audit defensibility, and you will have done it without slowing anyone down.</p>
      <div class="article-callout"><div>📐</div><div><strong>Want our SDLC reference architecture?</strong><br>We share the platform-team playbook with engagement clients. <a href="contact.html">Get in touch →</a></div></div>
    `
  },
  'regulated-eu': {
    tag:'Blog', date:'Mar 14, 2026', read:'8 min', author:['James O\'Connor','VP, GRC Practice'],
    title:'Building Secure, Compliant Systems in Regulated European Environments',
    lede:'A practical lens on DORA, NIS2, and what enterprise CISOs across the EU are quietly prioritizing right now.',
    cover:'https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=1600&q=80',
    tags:['#dora','#nis2','#eu','#regulation'],
    body:`
      <p>The European regulatory landscape has tightened sharply in the last 18 months. DORA went into effect for financial services. NIS2 obligations expanded across critical sectors. The Cyber Resilience Act now reaches into product security. Together they have changed what "good" looks like for an enterprise security program in the EU.</p>
      <h2>What is actually different now</h2>
      <p>Three shifts matter more than the rest:</p>
      <ul>
        <li><strong>Personal accountability for board members.</strong> NIS2 makes management bodies legally responsible for supervision of cybersecurity measures. The risk register is now a board document.</li>
        <li><strong>Third-party concentration is a regulator priority.</strong> DORA explicitly targets concentration risk in critical ICT providers. Diversification is no longer optional for institutions of significance.</li>
        <li><strong>Incident reporting timelines have collapsed.</strong> Initial notifications inside hours, not days. The time to act is shorter than the time to investigate fully.</li>
      </ul>
      <h2>Where serious teams are spending the budget</h2>
      <h3>Identity and privileged access</h3>
      <p>The single biggest control gap we still see is privileged access. NIS2 and DORA both push hard on identity assurance. Phishing-resistant MFA, just-in-time elevation, and recorded sessions are the new baseline.</p>
      <h3>Third-party risk operationalization</h3>
      <p>Vendor risk programs that were spreadsheets two years ago are now continuous monitoring programs with concrete exit plans. The exit plan is the part that catches programs short.</p>
      <h3>Incident response that meets the clock</h3>
      <p>The four-hour notification window in DORA is not a goal — it is a regulator-tested deadline. We see programs investing in detection-to-decision automation, not detection alone.</p>
      <blockquote>European regulators have moved from prescribing controls to prescribing outcomes. That is a harder bar to clear, but a better one to defend.</blockquote>
      <h2>The action that returns the most this quarter</h2>
      <p>If you can do only one thing, run a tabletop on the four-hour notification window. Start the clock at "we believe an incident has occurred." Walk through who decides, who drafts, who signs, and what evidence is attached. You will discover the seams in your process before a regulator does.</p>
    `
  },
  'resilience-vs-defense': {
    tag:'Article', date:'Feb 02, 2026', read:'5 min', author:['Erik Lindqvist','CEO &amp; Co-Founder'],
    title:'Cyber Resilience vs. Cyber Defense: What Leaders Should Prioritize',
    lede:'Why resilience — not perimeter hardening — has quietly become the differentiator between mature and merely funded security programs.',
    cover:'https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&w=1600&q=80',
    tags:['#resilience','#strategy','#leadership'],
    body:`
      <p>The conversation between a CEO and a CISO has shifted in the last two years. It used to be about whether the security program was strong enough to keep attackers out. It is now about whether the business can keep operating when an attacker gets in.</p>
      <h2>Defense is necessary. Resilience is decisive.</h2>
      <p>A defense-only mindset assumes that prevention can be made reliable. The data has been clear for some time that it cannot. The question worth asking is not "how do we stop this?" but "how do we recover from this fast enough that customers do not notice?"</p>
      <h2>The three resilience capabilities boards now ask about</h2>
      <h3>Containment speed</h3>
      <p>How long does it take to isolate a compromised segment of the environment? Mature programs measure this in minutes. Most measure it in hours.</p>
      <h3>Recovery time for the most valuable systems</h3>
      <p>Not the disaster-recovery test from six months ago. The actual time to bring the top-three revenue systems back from a clean state. Test it; do not assume.</p>
      <h3>Communication readiness</h3>
      <p>Templates for customer notification, regulator filing, and internal updates — pre-approved by legal, ready to fire. The first 24 hours of an incident are won or lost on communication, not technology.</p>
      <blockquote>Resilience is what survives contact with reality. Defense is what you draw on the whiteboard.</blockquote>
      <h2>What to ask your team this month</h2>
      <ol>
        <li>If our most critical service was unavailable right now, how long until it is back?</li>
        <li>Who has authority to declare a major incident, and is that person reachable on a Sunday night?</li>
        <li>What is the first sentence of our customer notification, and is it pre-approved?</li>
      </ol>
      <p>If any answer takes more than 30 seconds, you have a resilience gap that no defensive control will close.</p>
    `
  },
  'mitre-attack': {
    tag:'Blog', date:'Jan 19, 2026', read:'6 min', author:['Priya Anand','Chief Threat Officer'],
    title:'MITRE ATT&CK as an Operating Manual',
    lede:'Most teams use ATT&CK as a checklist. The teams getting real value from it use it as a daily operating model.',
    cover:'https://images.unsplash.com/photo-1614064548237-096d5552c61c?auto=format&fit=crop&w=1600&q=80',
    tags:['#mitre-attack','#detection','#operations'],
    body:`
      <p>The MITRE ATT&amp;CK framework has been adopted everywhere and used well almost nowhere. Most security teams treat it as an audit artifact: a heatmap to color in once a quarter to show "we have coverage." That is the lowest-value possible use of the framework.</p>
      <h2>What changes when ATT&amp;CK becomes operational</h2>
      <p>The teams getting real leverage from ATT&amp;CK use it as the connective tissue between four daily activities:</p>
      <ul>
        <li><strong>Threat intel triage</strong> — every report that comes in is mapped to specific techniques, not just to a named group.</li>
        <li><strong>Detection engineering</strong> — every new rule cites the technique it covers and the gap it closes.</li>
        <li><strong>Hunt prioritization</strong> — quarterly hunts target the techniques most relevant to the org's threat profile, not the most exotic.</li>
        <li><strong>Purple-team validation</strong> — emulation exercises measure how well detections actually fire against techniques in scope.</li>
      </ul>
      <h2>How to start, in three weeks</h2>
      <h3>Week 1 — adopt the language</h3>
      <p>Every detection rule and every closed incident gets tagged with the relevant technique IDs. No new rule ships without a tag. Existing rules get a back-fill review.</p>
      <h3>Week 2 — map your stack honestly</h3>
      <p>For each technique you claim to cover, list the rule, the data source, and the last time it fired. Honest coverage maps look much sparser than the marketing version.</p>
      <h3>Week 3 — pick two techniques to actually validate</h3>
      <p>Run a simulated execution. Watch what fires and what does not. Tune. Re-run. The exercise will teach more than a quarter of dashboard work.</p>
      <blockquote>ATT&amp;CK is not a coverage chart. It is a shared vocabulary that lets threat intel, detection, and hunting teams stop talking past each other.</blockquote>
      <p>The framework is free. The discipline of using it operationally is not. The teams that invest in the discipline are the ones whose detection programs keep getting better instead of plateauing at "we have all the categories."</p>
    `
  },
  'identity-inflection': {
    tag:'Article', date:'Dec 04, 2025', read:'6 min', author:['Marie Dubois','Head of Threat Research'],
    title:'The Identity Security Inflection Point',
    lede:'Identity is now the primary attack surface. Here is what mature teams are doing about it before the rest of the industry catches up.',
    cover:'https://images.unsplash.com/photo-1555949963-aa79dcee981c?auto=format&fit=crop&w=1600&q=80',
    tags:['#identity','#zero-trust','#access'],
    body:`
      <p>For a long time, identity was a hygiene topic. SSO, MFA on the perimeter, an annual access review. That era is done. Identity is now the front line — the one place where most modern attacks begin and where most defenders are still under-invested.</p>
      <h2>Why this shift is happening now</h2>
      <p>Three forces converged. Cloud and SaaS made identity the only consistent control plane. Phishable MFA proved insufficient against modern session-stealing attacks. And the volume of non-human identities — service accounts, machine credentials, OAuth tokens — has overtaken the volume of human ones in most enterprises.</p>
      <h2>What the leading programs are doing</h2>
      <h3>Phishing-resistant MFA, end to end</h3>
      <p>FIDO2 hardware keys or platform passkeys for every privileged account. SMS, push, and TOTP retired or restricted to low-risk paths. The migration is not glamorous but it removes an entire class of attack.</p>
      <h3>Just-in-time and session-bound access</h3>
      <p>Standing privilege is dramatically reduced. Sensitive roles require explicit elevation with a reason and a time limit. Sessions are bound to device, geo, and posture — anomalies break the session, not just the next request.</p>
      <h3>Continuous identity threat detection</h3>
      <p>Behavioral baselines per principal. Token-replay detection. OAuth grant monitoring. The same telemetry rigor previously applied to endpoints is being applied to identities.</p>
      <blockquote>If you can read every API call in your environment but cannot tell which token made it, you do not have a security program. You have a logging program.</blockquote>
      <h2>What to do this quarter</h2>
      <ol>
        <li>Inventory non-human identities. You almost certainly have more than you think.</li>
        <li>Move every Tier-0 admin to phishing-resistant MFA. No exceptions.</li>
        <li>Add token-replay detection to your highest-value SaaS apps.</li>
      </ol>
      <p>Identity is the least optional investment a security program can make today. Programs that delay it will look the same on paper but perform very differently when an attacker arrives.</p>
    `
  },
  'hunting-budget': {
    tag:'Blog', date:'Nov 11, 2025', read:'5 min', author:['Priya Anand','Chief Threat Officer'],
    title:'Threat Hunting on a Budget',
    lede:'You do not need a fancy platform to start hunting. You need a hypothesis, an analyst, and the telemetry you already have.',
    cover:'https://images.unsplash.com/photo-1510511459019-5dda7724fd87?auto=format&fit=crop&w=1600&q=80',
    tags:['#threat-hunting','#detection','#sme'],
    body:`
      <p>Many security teams believe threat hunting requires a dedicated team, an expensive platform, and a wall of dashboards. The teams that actually hunt regularly will tell you the opposite. The discipline that matters is hypothesis-driven thinking, and the inputs that matter are the logs most organizations already collect.</p>
      <h2>The four-step lightweight hunt</h2>
      <h3>1. Pick one hypothesis</h3>
      <p>Make it specific. "An attacker is using <code>certutil</code> to download payloads" is a hunt. "There might be malware" is not. The hypothesis should reference a tactic, an asset class, and a behavior.</p>
      <h3>2. Define the data you need</h3>
      <p>For most lightweight hunts, you need three sources: process execution telemetry, authentication logs, and outbound network metadata. If you have those, you can hunt.</p>
      <h3>3. Run the query, then pivot</h3>
      <p>The first query is rarely the answer. It is the starting point. Cluster the results by asset and user. Pivot to the broader context around any anomaly. Most hunts end here, with a finding that is benign — but the pivot is where you learn the shape of your environment.</p>
      <h3>4. Document and codify</h3>
      <p>Every hunt becomes either a tuned detection rule, a documented baseline, or a known-noise note. Hunts that produce no artifact are hunts that do not compound.</p>
      <blockquote>Hunting is not a tool. It is a habit. A team that hunts one hour a week will outperform a team that buys a hunting platform and never opens it.</blockquote>
      <h2>A first hunt to run on Monday</h2>
      <p>Look for any execution of <code>powershell.exe</code> with a base64-encoded command line on a non-administrator workstation in the last seven days. Group by user. Read the decoded commands for anything you cannot explain. You will find either nothing, in which case you have a tighter baseline, or something worth investigating, in which case you have an incident. Either outcome is a win.</p>
    `
  },
  'soc-metrics': {
    tag:'Article', date:'Oct 02, 2025', read:'5 min', author:['Erik Lindqvist','CEO &amp; Co-Founder'],
    title:'SOC Metrics That Actually Matter',
    lede:'Most SOC dashboards are decoration. Here is the small set of metrics worth tracking — and the ones to retire.',
    cover:'https://images.unsplash.com/photo-1614064641938-3bbee52942c7?auto=format&fit=crop&w=1600&q=80',
    tags:['#soc','#metrics','#operations'],
    body:`
      <p>Every SOC has a metrics page. Most of them measure the wrong things. Alert volume, ticket count, mean time to acknowledge — none of those tell you whether your security operations are getting better, getting worse, or holding steady.</p>
      <h2>Retire these metrics</h2>
      <ul>
        <li><strong>Alert count.</strong> Bigger is not better. Lower is not better either. The number on its own is meaningless.</li>
        <li><strong>Tickets closed per analyst.</strong> Rewards speed over quality. Encourages closing without investigating.</li>
        <li><strong>Coverage maps with no validation.</strong> A heatmap of "rules deployed" without proof they fire is a wishful thinking diagram.</li>
      </ul>
      <h2>Track these instead</h2>
      <h3>True positive rate over time</h3>
      <p>Of the alerts you investigated this month, what fraction were real? If it is below 10%, your detection content is too noisy. If it is climbing, your tuning is paying off.</p>
      <h3>Mean time to contain (MTTC)</h3>
      <p>Not mean time to detect or respond — mean time to contain. The metric that correlates with actual business impact.</p>
      <h3>Detections that have never fired</h3>
      <p>Track this number every month. Detections with zero fires are either too tight, broken, or covering a non-existent threat. All three are worth investigating.</p>
      <h3>Hunt findings → rule conversion rate</h3>
      <p>Of the hunts you ran this quarter, how many produced a tuned detection rule? This is your detection program's improvement velocity.</p>
      <blockquote>A SOC that cannot tell whether it is improving will eventually stop improving. Pick the metrics that force the question.</blockquote>
      <p>Less is more. Five well-chosen metrics on a one-page review beat a dashboard with thirty.</p>
    `
  },
  'pentest-ai': {
    tag:'Blog', date:'Sep 14, 2025', read:'6 min', author:['Marie Dubois','Head of Threat Research'],
    title:'Pen Testing in the Age of AI',
    lede:'Offensive teams are quietly integrating LLMs into reconnaissance, payload generation, and exploitation. Defenders should be paying attention.',
    cover:'https://images.unsplash.com/photo-1542831371-29b0f74f9713?auto=format&fit=crop&w=1600&q=80',
    tags:['#pentest','#ai','#offensive-security'],
    body:`
      <p>Penetration testers were among the earliest serious adopters of large language models. The reasons are practical, not hype-driven: a large fraction of an offensive engagement is reading code, summarizing documentation, and drafting plausible pretexts. LLMs are good at all three.</p>
      <h2>Where LLMs are actually changing offensive work</h2>
      <h3>Reconnaissance synthesis</h3>
      <p>Recon used to be a slow read across hundreds of LinkedIn profiles, GitHub commits, and corporate filings. LLMs compress that into minutes. The output is not magic — but it is good enough to feed straight into a phishing pretext or a target-selection decision.</p>
      <h3>Payload obfuscation and adaptation</h3>
      <p>Modifying a known payload to slip past a specific EDR product used to require hours of trial and error. LLMs can produce dozens of variants in a single session. Most are bad; one or two work.</p>
      <h3>Exploit research acceleration</h3>
      <p>Reading vulnerability disclosures and turning them into proof-of-concept code is now substantially faster. Not magical, not autonomous — but a meaningful productivity boost for an experienced operator.</p>
      <h2>What this means for defenders</h2>
      <ul>
        <li><strong>Detection content has to assume polymorphic payloads.</strong> Hashes are useless. Behavior chains are not.</li>
        <li><strong>Pretexts will be more convincing.</strong> Anti-phishing controls keyed on language quality are obsolete.</li>
        <li><strong>The blast radius of a single skilled operator has expanded.</strong> The asymmetry between attack and defense has tilted further toward attack.</li>
      </ul>
      <blockquote>The LLM does not replace the offensive operator. It removes the boring parts of their job. That is what makes it dangerous.</blockquote>
      <h2>What to do</h2>
      <p>Hire a pen test team that uses these tools openly and reports on what worked. Their findings will tell you which controls are still effective and which were always theatrical. The good news for defenders is that detection-on-behavior, identity hardening, and pre-approved containment are still the highest-leverage investments. The threats have evolved, but the playbook for defending against them has not.</p>
    `
  },
  'compliance-as-code': {
    tag:'Article', date:'Aug 21, 2025', read:'7 min', author:['Ashish Shah','Head of GRC'],
    title:'Compliance as Code',
    lede:'Treat your GRC artifacts the way platform teams treat infrastructure: declarative, versioned, tested. Audit prep stops being a project.',
    cover:'https://images.unsplash.com/photo-1633409361618-c73427e4e206?auto=format&fit=crop&w=1600&q=80',
    tags:['#grc','#policy-as-code','#automation'],
    body:`
      <p>Most GRC programs run on documents. Word files for policy. Excel for risk register. PowerPoint for the board update. The work to assemble those documents is enormous, and most of it gets thrown away after the audit.</p>
      <p>The teams that have moved past this treat compliance the way platform teams treat infrastructure: as code that lives in a repository, runs through CI, and produces evidence as a side effect of operating normally.</p>
      <h2>What "compliance as code" actually looks like</h2>
      <h3>Policies as machine-readable artifacts</h3>
      <p>A policy is not a Word document with red-line tracking. It is a structured file (YAML, JSON, OPA Rego) that declares the rule, the scope, the owner, and the evidence requirements. It can be versioned, reviewed, and tested.</p>
      <h3>Controls implemented as automation</h3>
      <p>Where possible, the policy is enforced by code, not by people. Encryption at rest is verified by a Terraform check, not a control owner attestation. The check runs on every deploy and writes its result to an evidence store.</p>
      <h3>Evidence collected continuously</h3>
      <p>Auditors do not request evidence; they query it. Every control has a known query that returns the current state. The auditor's job becomes verifying the queries, not assembling the artifacts.</p>
      <blockquote>The goal is not to do less compliance work. It is to do the same compliance work once, and never again.</blockquote>
      <h2>Where to start</h2>
      <ol>
        <li><strong>Pick five controls that fail you most often.</strong> Usually access reviews, encryption verification, and patch evidence.</li>
        <li><strong>Write a query that returns each control's current state.</strong> Anything that cannot be queried needs a discussion about whether the control is real.</li>
        <li><strong>Schedule the query and store the output.</strong> That is your evidence. Build from there.</li>
      </ol>
      <h2>Why this matters now</h2>
      <p>Audit cycles are tightening. DORA and NIS2 expect continuous evidence, not annual reviews. Customer security questionnaires arrive weekly, not quarterly. The teams that treat compliance as a one-time project are running on a treadmill that speeds up every year. The teams that treat it as code are doing the work once and reaping it forever.</p>
    `
  }
};
