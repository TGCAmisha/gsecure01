<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Author Profile | G'Secure Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{orange:'#faa61a',orangeSoft:'#ffd07a',deep:'#004a80',bright:'#0077d0',ink:'#0a0c10',surface:'#11141a',surface2:'#161a22',mute:'#6a7280',body:'#c6c8ca'}},fontFamily:{sans:['Roboto'],mono:['"Roboto Mono"']}}}}</script>
<link rel="stylesheet" href="assets/style.css">
</head><body class="overflow-x-hidden">
<div id="nav-mount"></div>

<section class="relative pt-12 pb-12 overflow-hidden">
  <div class="absolute inset-0 grid-mask"></div>
  <div class="orb orb-orange drift1" style="width:380px;height:380px;top:-80px;right:-40px"></div>
  <div class="relative max-w-5xl mx-auto px-6">
    <div class="text-[12px] text-brand-mute font-mono mb-6 reveal"><a href="index.html" class="hover:text-brand-orange">Home</a> / <a href="press.html" class="hover:text-brand-orange">Press</a> / <span class="text-brand-orange" id="crumb-name">Profile</span></div>
    <div class="flex flex-col md:flex-row gap-8 items-start reveal">
      <div class="w-32 h-32 rounded-full bg-gradient-to-br from-brand-deep via-brand-bright to-brand-orange grid place-items-center text-white font-bold text-3xl shrink-0" id="a-init">GS</div>
      <div class="flex-1">
        <div class="eyebrow text-brand-orange mb-3" id="a-role">Role</div>
        <h1 class="h-mega text-white" id="a-name">Author</h1>
        <p class="mt-4 text-brand-body text-[17px] max-w-2xl" id="a-bio">Loading…</p>
        <div class="mt-6 flex flex-wrap items-center gap-3">
          <a href="press.html#contact" class="btn btn-orange">Press Inquiry</a>
          <a href="#" class="btn btn-ghost" id="a-linkedin">LinkedIn →</a>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="relative py-12 border-y border-white/5 bg-brand-surface/30">
  <div class="max-w-5xl mx-auto px-6">
    <div class="eyebrow text-brand-orange mb-4 reveal">Areas of Expertise</div>
    <div class="flex flex-wrap gap-2 reveal" id="a-tags"></div>
  </div>
</section>

<section class="relative py-20">
  <div class="max-w-7xl mx-auto px-6">
    <div class="mb-10 reveal">
      <div class="eyebrow text-brand-orange mb-3">Articles &amp; Insights</div>
      <h2 class="h-section text-white">Published <span class="grad-text">work</span>.</h2>
    </div>
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5" id="a-articles"></div>
  </div>
</section>

<div id="cta-mount"></div>
<div id="footer-mount"></div>
<script src="assets/app.js"></script>

<script>
const AUTHORS = {
  'marie-dubois': {
    name: 'Marie Dubois',
    role: 'Head of Threat Research',
    bio: 'Marie leads G\'Secure Labs\' threat research practice, with a focus on adversary emulation, phishing evolution, and translating intelligence into operational detection content. She speaks regularly at industry conferences and is a regular source for journalists covering the European cyber threat landscape.',
    tags: ['Threat Intelligence','Adversary Emulation','Phishing &amp; Social Engineering','LLM-Augmented Threats','Detection Engineering'],
    articles: ['identity-inflection','pentest-ai']
  },
  'erik-lindqvist': {
    name: 'Erik Lindqvist',
    role: 'CEO &amp; Co-Founder',
    bio: 'Erik co-founded G\'Secure Labs with the operating premise that security outcomes — not control inventories — are the right metric for an enterprise program. He works directly with boards and executive teams on resilience strategy and the operating model behind 24×7×365 cyber defense.',
    tags: ['Strategy','Operational Resilience','Operating Model','Board Engagement','Executive Briefing'],
    articles: ['resilience-vs-defense','soc-metrics']
  },
  'priya-anand': {
    name: 'Priya Anand',
    role: 'Chief Threat Officer',
    bio: 'Priya runs G\'Secure Labs\' offensive and defensive ops practice. Her work bridges SOC engineering, threat hunting, and incident response — with a particular interest in collapsing the time between detection and decisive action.',
    tags: ['SOC Operations','Detection Engineering','Threat Hunting','Incident Response','MITRE ATT&amp;CK'],
    articles: ['mitre-attack','hunting-budget']
  },
  'james-oconnor': {
    name: 'James O\'Connor',
    role: 'VP, GRC Practice',
    bio: 'James has led more than 100 ISO 27001, SOC 2, and DORA engagements across regulated industries. He is a sought-after voice for journalists and boards trying to understand what European regulation actually requires of security programs in 2026.',
    tags: ['DORA','NIS2','ISO 27001','SOC 2','Risk Management','Audit Defense'],
    articles: ['regulated-eu']
  },
  'umesh-rajput': {
    name: 'Umesh Singh Rajput',
    role: 'Head of Engineering',
    bio: 'Umesh leads the platform engineering team that builds the tooling, automation, and detection infrastructure behind G\'Secure Labs\' managed services. His writing focuses on how mature platform teams ship secure, audit-ready systems by default.',
    tags: ['Platform Engineering','Secure SDLC','Compliance-as-Code','Automation','Observability'],
    articles: ['engineering-secure']
  },
  'ashish-shah': {
    name: 'Ashish Shah',
    role: 'Head of GRC',
    bio: 'Ashish leads governance, risk, and compliance for G\'Secure Labs and its clients. His specialty is pulling GRC out of spreadsheets and into engineering workflows — making evidence collection a byproduct of operating normally.',
    tags: ['Governance','Risk','Compliance','Policy-as-Code','Framework Mapping','Audit Readiness'],
    articles: ['compliance-as-code']
  },
};

const ARTICLE_META = {
  'engineering-secure': ['Article','Apr 22, 2026','Engineering for Security &amp; Compliance by Design'],
  'regulated-eu': ['Blog','Mar 14, 2026','Building Secure, Compliant Systems in Regulated European Environments'],
  'resilience-vs-defense': ['Article','Feb 02, 2026','Cyber Resilience vs. Cyber Defense: What Leaders Should Prioritize'],
  'mitre-attack': ['Blog','Jan 19, 2026','MITRE ATT&amp;CK as an Operating Manual'],
  'identity-inflection': ['Article','Dec 04, 2025','The Identity Security Inflection Point'],
  'hunting-budget': ['Blog','Nov 11, 2025','Threat Hunting on a Budget'],
  'soc-metrics': ['Article','Oct 02, 2025','SOC Metrics That Actually Matter'],
  'pentest-ai': ['Blog','Sep 14, 2025','Pen Testing in the Age of AI'],
  'compliance-as-code': ['Article','Aug 21, 2025','Compliance as Code'],
};

function getId() {
  const p = new URLSearchParams(location.search);
  return p.get('id') || 'marie-dubois';
}

function init(name) {
  return name.replace(/&#39;/g,'\'').replace(/'/g,'').split(' ').map(s=>s[0]).slice(0,2).join('');
}

function render() {
  const id = getId();
  const a = AUTHORS[id] || AUTHORS['marie-dubois'];
  document.title = a.name + ' | G\'Secure Labs';
  document.getElementById('crumb-name').innerHTML = a.name;
  document.getElementById('a-init').textContent = init(a.name);
  document.getElementById('a-name').innerHTML = a.name;
  document.getElementById('a-role').innerHTML = a.role;
  document.getElementById('a-bio').textContent = a.bio;
  document.getElementById('a-tags').innerHTML = a.tags.map(t=>`<span class="chip">${t}</span>`).join('');

  const articleSlugs = a.articles && a.articles.length ? a.articles : Object.keys(ARTICLE_META).slice(0,3);
  document.getElementById('a-articles').innerHTML = articleSlugs.map(s => {
    const m = ARTICLE_META[s]; if (!m) return '';
    return `<a href="article.html?slug=${s}" class="card p-6 reveal block">
      <div class="flex items-center gap-3 mb-3"><span class="chip">${m[0]}</span><span class="text-brand-mute text-xs font-mono">${m[1]}</span></div>
      <h3 class="text-white font-bold text-[16px] leading-snug">${m[2]}</h3>
      <span class="mt-4 inline-flex items-center gap-1 text-brand-orange text-[13px] font-semibold">Read article →</span>
    </a>`;
  }).join('');
}
render();
mountChrome('press.html');
</script>
</body></html>
