<script>
const AUTHORS = {
  'marie-dubois': {
    name: 'Marie Dubois',
    role: 'Head of Threat Research',
    years: '15+ years',
    langs: 'EN · FR',
    creds: 'GIAC GREM, GCFA. Speaker at FIRST and Black Hat Europe. Contributor to MITRE ATT&amp;CK community.',
    bio: 'Marie leads G\'Secure Labs\' threat research practice, with a focus on adversary emulation, phishing evolution, and translating intelligence into operational detection content. Before G\'Secure she spent eight years in incident response and intelligence roles across two European banks. She speaks regularly at industry conferences and is a regular source for journalists covering the European cyber threat landscape.',
    tags: ['Threat Intelligence','Adversary Emulation','Phishing &amp; Social Engineering','LLM-Augmented Threats','Detection Engineering','Identity-First Security'],
    views: [
      ['On AI-assisted phishing','The grammar tell is dead. Awareness training keyed on broken English will quietly become noise — the next generation of email controls have to live in sender-behavior baselines, not language inspection.'],
      ['On identity as the new perimeter','Phishing-resistant MFA is now the floor, not the ceiling. The serious work is non-human identity hygiene and continuous threat detection on session and token activity.'],
      ['On red team / blue team productivity','LLMs do not replace the offensive operator. They remove the boring parts of their job. Defenders need to plan accordingly.']
    ],
    articles: ['identity-inflection','pentest-ai']
  },
  'erik-lindqvist': {
    name: 'Erik Lindqvist',
    role: 'CEO &amp; Co-Founder',
    years: '20+ years',
    langs: 'EN · SV',
    creds: 'Former CISO at two Nordic banks. CISSP, CISM. Frequent contributor to board-level resilience working groups across the Nordics.',
    bio: 'Erik co-founded G\'Secure Labs with the operating premise that security outcomes — not control inventories — are the right metric for an enterprise program. He works directly with boards and executive teams on resilience strategy and the operating model behind 24×7×365 cyber defense. Before founding the firm he ran security operations at two Nordic banks.',
    tags: ['Strategy','Operational Resilience','Operating Model','Board Engagement','Executive Briefing','SOC Economics'],
    views: [
      ['On the resilience benchmark','Detect 1 / Investigate 10 / Respond 45 is not a marketing slogan. It is the operating SLA we hold ourselves to and the conversation we want every board to be able to have with their security leader.'],
      ['On vanity SOC metrics','Mean time to acknowledge tells you nothing about whether the business is safer. Boards should ask about mean time to contain, true-positive rate, and validated detection coverage.'],
      ['On Nordic cybersecurity','The Nordics have quietly built one of the most operationally mature managed-defense ecosystems in Europe. The next decade is about scaling that discipline outward.']
    ],
    articles: ['resilience-vs-defense','soc-metrics']
  },
  'priya-anand': {
    name: 'Priya Anand',
    role: 'Chief Threat Officer',
    years: '18+ years',
    langs: 'EN',
    creds: 'OSCP, GCIA, GCIH. Former incident response lead at a global financial services firm. Wrote the firm\'s adversary emulation curriculum.',
    bio: 'Priya runs G\'Secure Labs\' offensive and defensive operations practice. Her work bridges SOC engineering, threat hunting, and incident response — with a particular interest in collapsing the time between detection and decisive action. Before joining the firm she led IR at a global financial-services group through several major intrusion campaigns.',
    tags: ['SOC Operations','Detection Engineering','Threat Hunting','Incident Response','MITRE ATT&amp;CK','Auto-Containment'],
    views: [
      ['On detection coverage','If you cannot prove a technique fires in your environment, you do not cover it. You hope you cover it. The whole industry has to move from heatmaps to validation.'],
      ['On alert fatigue','Most SOCs do not have an alert problem. They have a context problem. Eleven loud rules carrying 60% of your queue are usually doing nothing for you.'],
      ['On ransomware','Modern campaigns are over in under an hour. Defenders do not win by detecting first. They win by being able to act first.']
    ],
    articles: ['mitre-attack','hunting-budget']
  },
  'james-oconnor': {
    name: 'James O\'Connor',
    role: 'VP, GRC Practice',
    years: '22+ years',
    langs: 'EN',
    creds: 'CISA, CRISC, ISO 27001 Lead Auditor. Has led 100+ ISO, SOC 2, and DORA engagements across financial services, healthcare and critical infrastructure.',
    bio: 'James has led more than 100 ISO 27001, SOC 2, and DORA engagements across regulated industries. He is a sought-after voice for journalists and boards trying to understand what European regulation actually requires of security programs. His specialty is mapping overlapping frameworks so customers do not pay twice for the same control evidence.',
    tags: ['DORA','NIS2','ISO 27001','SOC 2','Risk Management','Audit Defense','Third-Party Risk'],
    views: [
      ['On DORA','Regulators have moved from prescribing controls to prescribing outcomes. That is a harder bar to clear and a better one to defend.'],
      ['On the four-hour notification window','Most institutions discover their handoff problems on paper before they discover them live. A tabletop on the clock is the single highest-return DORA-prep activity I run.'],
      ['On framework overlap','Companies with clean SOC 2 are 70% of the way to ISO 27001. Treating it as a fresh start is the most expensive mistake I see.']
    ],
    articles: ['regulated-eu']
  },
  'umesh-rajput': {
    name: 'Umesh Singh Rajput',
    role: 'Head of Engineering',
    years: '17+ years',
    langs: 'EN',
    creds: 'Former platform engineering lead at two SaaS firms. Open-source contributor to detection-as-code tooling. CKA, AWS Security Specialty.',
    bio: 'Umesh leads the platform engineering team that builds the tooling, automation, and detection infrastructure behind G\'Secure Labs\' managed services. His writing focuses on how mature platform teams ship secure, audit-ready systems by default — and how detection content can be tested and version-controlled like any other production artifact.',
    tags: ['Platform Engineering','Secure SDLC','Compliance-as-Code','Detection-as-Code','Automation','Observability'],
    views: [
      ['On shift-left security','The teams that get this right do not move scanners earlier. They redesign the developer experience so the secure path is also the easiest path.'],
      ['On detection content','Treat detections like production code. Version them, test them, deploy them through CI. Hand-edited dashboards do not scale.'],
      ['On SBOM and supply-chain hygiene','Every starter template in your platform should ship with signing, attestation, and SBOM emission already wired in. Compliance becomes a side effect.']
    ],
    articles: ['engineering-secure']
  },
  'ashish-shah': {
    name: 'Ashish Shah',
    role: 'Head of GRC',
    years: '16+ years',
    langs: 'EN',
    creds: 'CISA, ISO 27001 Lead Implementer. GRC tooling specialist with deep work in OPA / Rego and policy-as-code patterns.',
    bio: 'Ashish leads governance, risk, and compliance for G\'Secure Labs and its clients. His specialty is pulling GRC out of spreadsheets and into engineering workflows — making evidence collection a byproduct of operating normally rather than an annual scramble.',
    tags: ['Governance','Risk','Compliance','Policy-as-Code','Framework Mapping','Audit Readiness'],
    views: [
      ['On compliance as code','The goal is not to do less compliance work. It is to do the same compliance work once, and never again.'],
      ['On the risk register','It is the document auditors flip to first. Make it real, make it short, and update it. The rest follows.'],
      ['On evidence collection','Auditors should not be requesting evidence. They should be querying it. If your control state is not queryable, the control may not be real.']
    ],
    articles: ['compliance-as-code']
  },
};

const ARTICLE_META = {
  'engineering-secure': ['Article','Apr 22, 2026','Engineering for Security &amp; Compliance by Design'],
  'regulated-eu': ['Blog','Mar 14, 2026','Building Secure, Compliant Systems in Regulated European Environments'],
  'resilience-vs-defense': ['Article','Feb 02, 2026','Cyber Resilience vs. Cyber Defense: What Leaders Should Prioritize'],
  'mitre-attack': ['Blog','Jan 19, 2026','MITRE ATT&amp;CK as an Operating Manual'],
  'identity-inflection': ['Article','Dec 04, 2025','The Identity Security Inflection Point'],
  'hunting-budget': ['Blog','Nov 11, 2025','Threat Hunting on a Budget'],
  'soc-metrics': ['Article','Oct 02, 2025','SOC Metrics That Actually Matter'],
  'pentest-ai': ['Blog','Sep 14, 2025','Pen Testing in the Age of AI'],
  'compliance-as-code': ['Article','Aug 21, 2025','Compliance as Code'],
};

function getId() {
  const p = new URLSearchParams(location.search);
  return p.get('id') || 'marie-dubois';
}

function init(name) {
  return name.replace(/&#39;/g,'\'').replace(/'/g,'').split(' ').map(s=>s[0]).slice(0,2).join('');
}

function render() {
  const id = getId();
  const a = AUTHORS[id] || AUTHORS['marie-dubois'];
  document.title = a.name + ' | G\'Secure Labs';
  document.getElementById('crumb-name').innerHTML = a.name;
  document.getElementById('a-init').textContent = init(a.name);
  document.getElementById('a-name').innerHTML = a.name;
  document.getElementById('a-role').innerHTML = a.role;
  document.getElementById('a-bio').textContent = a.bio;
  document.getElementById('a-years').textContent = a.years || '—';
  document.getElementById('a-langs').textContent = a.langs || 'EN';
  document.getElementById('a-creds').innerHTML = a.creds || '—';
  document.getElementById('a-tags').innerHTML = a.tags.map(t=>`<span class="chip">${t}</span>`).join('');

  const views = a.views || [];
  document.getElementById('a-views').innerHTML = views.map(([h,q])=>`
    <div class="card p-6 reveal">
      <div class="eyebrow text-brand-orange mb-2">${h}</div>
      <p class="text-brand-body text-[15px] leading-relaxed italic">"${q}"</p>
    </div>`).join('');

  const articleSlugs = a.articles && a.articles.length ? a.articles : Object.keys(ARTICLE_META).slice(0,3);
  document.getElementById('a-articles').innerHTML = articleSlugs.map(s => {
    const m = ARTICLE_META[s]; if (!m) return '';
    return `<a href="article.html?slug=${s}" class="card p-6 reveal block">
      <div class="flex items-center gap-3 mb-3"><span class="chip">${m[0]}</span><span class="text-brand-mute text-xs font-mono">${m[1]}</span></div>
      <h3 class="text-white font-bold text-[16px] leading-snug">${m[2]}</h3>
      <span class="mt-4 inline-flex items-center gap-1 text-brand-orange text-[13px] font-semibold">Read article →</span>
    </a>`;
  }).join('');
}
render();
mountChrome('press.html');
</script>
</body></html>
