<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Services | G'Secure Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{orange:'#faa61a',orangeSoft:'#ffd07a',deep:'#004a80',bright:'#0077d0',ink:'#0a0c10',surface:'#11141a',surface2:'#161a22',mute:'#6a7280',body:'#c6c8ca'}},fontFamily:{sans:['Roboto'],mono:['"Roboto Mono"']}}}}</script>
<link rel="stylesheet" href="assets/style.css">
</head><body class="overflow-x-hidden">
<div id="nav-mount"></div>
<section class="relative pt-12 pb-16 overflow-hidden">
  <div class="absolute inset-0 grid-mask"></div>
  <div class="orb orb-orange drift1" style="width:420px;height:420px;top:-80px;right:-60px"></div>
  <div class="orb orb-blue drift2" style="width:460px;height:460px;bottom:-200px;left:-80px"></div>
  <div class="relative max-w-7xl mx-auto px-6">
    <div class="text-[12px] text-brand-mute font-mono mb-6 reveal"><a href="index.html" class="hover:text-brand-orange">Home</a> / <span class="text-brand-orange">Services</span></div>
    <div class="eyebrow text-brand-orange mb-5 reveal">Cybersecurity Services</div>
    <h1 class="h-mega text-white max-w-3xl reveal">Every layer of <span class="grad-text">your defense</span>, operated as one.</h1>
    <p class="mt-6 text-brand-body text-[17px] max-w-2xl reveal">Twelve services. One operating model. From governance to threat hunting — wrapped in a 24×7 SOC and tuned to your business.</p>
  </div>
</section>
<section class="relative py-20 border-t border-white/5"><div class="max-w-7xl mx-auto px-6">
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-5" id="grid"></div>
</div></section>
<div id="cta-mount"></div>
<div id="footer-mount"></div>
<script src="assets/app.js"></script>
<script>
document.getElementById('grid').innerHTML = SERVICES.map(([h,t,sub,icon,col])=>`
  <a href="${h}" class="card p-6 reveal block">
    <div class="w-12 h-12 rounded-lg ${col==='orange'?'bg-brand-orange/10 text-brand-orange':'bg-brand-bright/10 text-brand-bright'} grid place-items-center mb-5"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${ICONS[icon]}</svg></div>
    <h3 class="text-white font-bold text-lg mb-2">${t}</h3>
    <p class="text-brand-body text-[14px]">${sub}</p>
    <span class="mt-5 inline-flex items-center gap-1 text-brand-orange text-[13px] font-semibold">Read More →</span>
  </a>`).join('');
mountChrome('services.html');
</script>
</body></html>
