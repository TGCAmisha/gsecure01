  'ai-phishing': {
    cat:'Threat Research', read:'5 min read', date:'Published May 2026',
    title:'The rise of AI-assisted phishing — what defenders should do now',
    lede:'Generative AI has lowered the cost of writing convincing phishing lures to near zero. Detection rules that relied on broken grammar are no longer enough. Here is what changed and where to refocus your controls.',
    author:['Marie Dubois','Head of Threat Research','https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&w=200&q=80'],
    cover:'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=1600&q=80',
    tags:['#phishing','#ai-threats','#email-security','#detection'],
    body:`
      <p>For more than a decade, phishing awareness training leaned on a comforting fiction: that attackers wrote badly. Misspellings, broken grammar, and stilted English were the easiest tells. Users were taught to spot them. Filters were tuned to flag them. The model worked.</p>
      <p>That model is now obsolete. Generative AI has made fluent, context-aware, native-language phishing essentially free to produce at scale.</p>
      <h2>What actually changed</h2>
      <p>Three things shifted at the same time, and they compound:</p>
      <ul>
        <li><strong>Linguistic fluency.</strong> Lures are grammatically clean, locally idiomatic, and tonally appropriate.</li>
        <li><strong>Personalization at scale.</strong> Public profile data is fed into generators to produce thousands of unique messages.</li>
        <li><strong>Multi-channel pretexting.</strong> A single campaign now coordinates email, SMS, voicemail, and chat — each reinforcing the others.</li>
      </ul>
      <blockquote>The grammar tell is dead. We have to assume every phish that lands in a user's inbox reads like it was written by a colleague.</blockquote>
      <h2>Where the new tells live</h2>
      <p>The higher-confidence signals have moved to <em>context</em> and <em>behavior</em>. Has this sender ever communicated with this recipient before? Is the request consistent with the sender's normal pattern? Does the linked domain resolve to thin-reputation infrastructure?</p>
      <h2>A practical 90-day plan</h2>
      <h3>1. Tune detections away from grammar</h3>
      <p>Audit current email security rules. Anything keyed on "broken English" — retire or downweight. They produce noise on legitimate non-native-speaker mail and miss clean lures entirely.</p>
      <h3>2. Push hard on sender-behavior baselines</h3>
      <p>Configure or build a "first-time external sender + financial language + link" composite signal. It is one of the highest-precision single rules we deploy.</p>
      <h3>3. Make reporting frictionless</h3>
      <p>A one-click report button that goes straight to the SOC will outperform any quiz. Measure success by report rate, not click rate.</p>
      <div class="callout"><div class="ic">⚡</div><div><strong>Want a phishing readiness review?</strong><br>Our threat research team will run a 60-minute audit of your current email controls. <a href="contact.html">Book a session →</a></div></div>
    `
  },
  'dora': {
    cat:'Compliance', read:'7 min read', date:'Published April 2026',
    title:'DORA is here: a practical readiness checklist for financial services',
    lede:'The Digital Operational Resilience Act applies in full from January 2025. If your audit prep still looks like a spreadsheet of policy bullets, you are behind. Here is the checklist we walk every financial-services client through.',

    body:`
      <p>DORA is not just another regulation to bolt onto an existing GRC program. Its requirements cut across IT operations, third-party risk, incident reporting, and board governance — and the depth of evidence regulators expect goes well beyond what most institutions have collected for prior frameworks.</p>
      <h2>1. ICT risk management framework</h2>

        <li>Defined recovery time and recovery point objectives per critical function</li>
      </ul>
      <h3>Common gap</h3>
      <p>An asset inventory exists, but it lives in spreadsheets that no one updates. Tie discovery to your CMDB or EDR feed and treat the spreadsheet as a downstream report, not a source of truth.</p>
      <h2>2. ICT-related incident reporting</h2>
      <ul>
        <li>Severity classification scheme aligned to DORA categories</li>

      <h2>3. Digital operational resilience testing</h2>
      <ul>
        <li>Annual basic test program covering all critical ICT systems</li>
        <li>Threat-led penetration test (TLPT) every three years for systemically important institutions</li>

  'alert-fatigue': {
    cat:'SOC Ops', read:'4 min read', date:'Published April 2026',
    title:'How we cut alert fatigue 60% with behavioral correlation',
    lede:'Most SOCs do not have an alert problem. They have a context problem. Here is how a four-week tuning sprint cut a customer\'s daily alert volume by 60% without dropping a single true positive.',
    author:['Priya Anand','Chief Threat Officer','https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=200&q=80'],
    cover:'https://images.unsplash.com/photo-1614064641938-3bbee52942c7?auto=format&fit=crop&w=1600&q=80',
    tags:['#soc','#alert-fatigue','#detection-engineering','#tuning'],
    body:`
      <p>The customer's analysts were closing 1,800 alerts a day across two shifts. Roughly 4% were true positives. Burn-out was real, hiring was hard, and the team had stopped looking forward to triage queues. The fix was not a new tool. It was four weeks of disciplined tuning.</p>
      <h2>The diagnosis</h2>
      <p>We pulled 90 days of closed alerts and clustered them by detection rule, asset, and disposition.</p>
      <ul>
        <li>Eleven detection rules generated 62% of all alerts. None of them had ever produced a confirmed incident.</li>
        <li>The same five service accounts appeared in 41% of "suspicious authentication" alerts.</li>
      </ul>
      <h2>The four weeks</h2>
      <h3>Week 1 — kill the noise floor</h3>
      <p>We disabled the eleven low-yield rules entirely. Each got a one-line note in the runbook explaining why.</p>
      <h3>Week 2 — model the known-good</h3>
      <p>For the five service accounts, we built behavioral baselines: source IPs, target systems, frequency, time-of-day. Inside the baseline became suppressed; outside became high priority.</p>
      <blockquote>Suppression is not the same as deletion. The events still log; they just stop interrupting an analyst.</blockquote>
      <h3>Week 3 — stitch the chains</h3>
      <p>We replaced 14 single-event detections with three chained correlations. A failed login is noise. Failed login + new-geo success + sensitive file read in 15 minutes is a story.</p>
      <h3>Week 4 — measure and lock</h3>
      <p>Average daily alert count dropped to 720. True positive rate rose to 11%. Mean time to triage dropped from 14 minutes to 4.</p>
      <p>If you have an alert-fatigue problem, you do not need a bigger team. You probably need a quieter queue.</p>
      <div class="callout"><div class="ic">⚡</div><div><strong>Want a free detection-quality review?</strong><br>We will pull 30 days of your alerts, cluster them, and report the noisiest rules. <a href="contact.html">Book a session →</a></div></div>
    `
  },
  'lolbins': {
    cat:'Threat Hunting', read:'8 min read', date:'Published March 2026',
    title:'Hunting living-off-the-land binaries with UEBA',
    lede:'Native Windows binaries leave thin signal trails on purpose. Behavior-based correlation is the most reliable way to catch them — but only if your hunting hypotheses are precise.',
    author:['Priya Anand','Chief Threat Officer','https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=200&q=80'],
    cover:'https://images.unsplash.com/photo-1510511459019-5dda7724fd87?auto=format&fit=crop&w=1600&q=80',
    tags:['#threat-hunting','#ueba','#lolbins','#detection'],
    body:`
      <p>An attacker who lives off the land does not need to drop new files. They reach for the binaries already trusted on your endpoints — <code>certutil</code>, <code>bitsadmin</code>, <code>mshta</code>, <code>rundll32</code>, <code>wmic</code>, PowerShell. The signature world is mostly blind to this. Behavior, in contrast, is loud.</p>
      <h2>Step 1 — define the corpus</h2>
      <p>Pick a focused list rather than the entire LOLBAS catalog. We rotate among three monthly:</p>
      <ul>
        <li><strong>Download primitives:</strong> <code>certutil -urlcache</code>, <code>bitsadmin /transfer</code>, <code>powershell IEX</code></li>
        <li><strong>Execution wrappers:</strong> <code>mshta</code>, <code>rundll32</code>, <code>regsvr32</code></li>
        <li><strong>Discovery and lateral:</strong> <code>wmic</code>, <code>net</code>, <code>nltest</code>, <code>dsquery</code></li>
      </ul>
      <h2>Step 2 — build the behavioral baseline</h2>
      <p>For each binary, query the last 90 days and compute a per-asset profile: invocation count, parent process distribution, command-line entropy, network destinations.</p>
      <blockquote>The hunt is not "did this binary run?" The hunt is "did this binary run in a way it has never run on this asset before?"</blockquote>
      <h2>Step 3 — score the deviations</h2>
      <ol>
        <li>New parent process for this binary on this asset</li>
        <li>Command-line entropy more than 2 standard deviations above the asset's mean</li>
        <li>Outbound connection to a domain not previously seen for this binary</li>
        <li>Time-of-day outside the asset's normal activity window</li>
      </ol>
      <h2>Step 4 — pivot from candidate to chain</h2>
      <p>A single anomalous LOLBin invocation is rarely the whole story. Pivot to the broader 30-minute window: who authenticated, what other suspicious processes ran, what new external IPs were contacted, what sensitive files were touched.</p>
      <h2>What this catches that signatures don't</h2>
      <p>In our last quarterly review across managed customers, behavioral LOLBin hunts surfaced 23 incidents. None had triggered a signature-based detection. Six had dwell-time longer than 30 days.</p>
      <div class="callout"><div class="ic">🔍</div><div><strong>Want a sample hunt query pack?</strong><br>Free for community use across Splunk, Sentinel, and Elastic. <a href="contact.html">Request access →</a></div></div>
    `

  'aws-iam': {
    cat:'Cloud Security', read:'6 min read', date:'Published March 2026',
    title:'Hardening AWS IAM: 12 rules we apply to every environment',
    lede:'IAM is where most cloud breaches start and most cloud audits stall. These twelve rules are the baseline we deploy on day one of every engagement.',
    author:['Erik Lindqvist','CEO &amp; Co-Founder','https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=200&q=80'],
    cover:'https://images.unsplash.com/photo-1633265486064-086b219458ec?auto=format&fit=crop&w=1600&q=80',
    tags:['#aws','#iam','#cloud-security','#hardening'],
    body:`
      <p>If you only fix one layer of your AWS estate, fix IAM. Most incidents we respond to in cloud environments trace back to over-permissive policies, dormant access keys, or weak conditions on assume-role trust.</p>
      <h2>Identity hygiene</h2>
      <ol>
        <li><strong>No long-lived access keys for humans.</strong> SSO with MFA for console; short-lived credentials for programmatic.</li>
        <li><strong>Disable root account access keys.</strong> Use the root account only for the few operations that require it.</li>
        <li><strong>Rotate service-account keys quarterly.</strong> Use AWS Secrets Manager so rotation is a non-event.</li>
        <li><strong>Block creation of IAM users.</strong> SCP at the org level. Principals come from your IdP.</li>
      </ol>
      <h2>Policy quality</h2>
      <ol start="5">
        <li><strong>No <code>"Action": "*"</code> in customer-managed policies.</strong> Scope with conditions if truly needed.</li>
        <li><strong>Use <code>aws:ResourceTag</code> and <code>aws:PrincipalTag</code> conditions.</strong> Tag-based access scales better than enumerated ARNs.</li>
        <li><strong>Boundary policies on every privileged role.</strong></li>
        <li><strong>Deny conditional public S3 access at bucket and account level.</strong></li>
      </ol>
      <blockquote>A wildcard action with a tight condition is fine. A wildcard action with no condition is a finding.</blockquote>
      <h2>Cross-account and federation</h2>
      <ol start="9">
        <li><strong>External ID required on every cross-account assume-role trust.</strong> No exceptions.</li>
        <li><strong>Source-IP conditions on break-glass roles.</strong></li>
        <li><strong>Session duration capped at one hour for production roles.</strong></li>
      </ol>
      <h2>Detection</h2>
      <ol start="12">
        <li><strong>CloudTrail organization trail with log-file integrity.</strong> Detection rules for <code>iam:CreateAccessKey</code>, <code>iam:AttachUserPolicy</code>, <code>sts:AssumeRole</code> from new IPs, and any use of root.</li>
      </ol>
      <h2>What to do this week</h2>
      <p>If you cannot fix all twelve in one go, fix these three first: disable root access keys, deny new IAM user creation org-wide, and audit every assume-role trust for missing external IDs.</p>
      <div class="callout"><div class="ic">☁️</div><div><strong>Want our AWS IAM hardening playbook?</strong><br>Terraform and SCP modules behind these rules. <a href="contact.html">Get the kit →</a></div></div>
    `
  },
  'ransomware': {
    cat:'Incident Response', read:'9 min read', date:'Published February 2026',
    title:'Anatomy of a 30-minute ransomware containment',
    lede:'A pan-European retailer faced a fast-moving ransomware campaign on a Friday evening. Here is the minute-by-minute story of how auto-containment kept the business running through Black Friday.',
    author:['Priya Anand','Chief Threat Officer','https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=200&q=80'],
    cover:'https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1600&q=80',
    tags:['#ransomware','#incident-response','#auto-containment','#playbook'],
    body:`
      <p>Friday, 18:47 local. The first alert fired from a regional distribution center. By 19:17, 800 endpoints across three countries had been isolated, encryption had been stopped on six of them, and POS systems were back to a clean state.</p>
      <h2>T+0:00 — The first signal</h2>
      <p>An EDR agent fired on a process tree we had seen before: <code>vssadmin delete shadows</code> spawned by a non-admin user, immediately followed by <code>cipher /w</code> on a network share. Tier 3 escalation within 90 seconds.</p>
      <h2>T+1:30 — Scoping</h2>
      <p>Tier 3 ran the standard ransomware sweep. Forty-seven hits across three countries. Same user account, same parent process, same SMB authentication chain.</p>
      <h2>T+4:00 — Auto-containment armed</h2>
      <p>The customer's playbook had a pre-approved trigger. Tier 3 hit it. The first 47 endpoints went offline within 30 seconds.</p>
      <blockquote>Pre-approved containment is the single highest-leverage decision a CISO can make. It is also the one most often delayed for fear of operational impact.</blockquote>
      <h2>T+8:00 — The chain expands</h2>
      <p>While containment was running, the chain detector kept matching new endpoints — first 200, then 500, then 800. POS terminals were excluded from auto-containment by design and instead got an emergency policy that blocked outbound SMB and disabled the compromised user account.</p>
      <h2>T+15:00 — Eradication</h2>
      <p>Forensic analysts scoped the initial access vector: a third-party logistics vendor's compromised VPN credential, used to RDP into a jump host. Credential revoked, jump host wiped, vendor's outbound IPs blackholed.</p>
      <h2>T+22:00 — Restoration</h2>
      <p>Endpoints isolated before encryption began were re-imaged. Endpoints where encryption had begun were quarantined for forensics. POS terminals never compromised — emergency policy held.</p>
      <h2>T+30:00 — Stabilized</h2>
      <p>Total impact: zero customer-facing downtime, six partially encrypted endpoints, one fully reset vendor relationship.</p>
      <div class="callout"><div class="ic">🛡️</div><div><strong>What made this possible</strong><br>Three things, in order: pre-approved auto-containment, chain-based detection that fires on tactic rather than indicator, and a tested playbook the team had drilled the prior month.</div></div>
      <h2>What to take away</h2>
      <ol>
        <li>Get pre-approval before the incident. Negotiating at 19:00 on a Friday is a losing trade.</li>
        <li>Detect on tactic, not just IOC.</li>
        <li>Exclude critical revenue paths from blanket containment, but have a fallback policy.</li>
        <li>Drill the playbook quarterly.</li>
      </ol>
    `
  },
  'soc2-iso': {

    title:'From SOC 2 to ISO 27001: mapping controls without redoing the work',
    lede:'If you already have a clean SOC 2 Type II, you are 70% of the way to ISO 27001. The trick is mapping the gap precisely instead of starting fresh.',
    author:['James O\'Connor','VP, GRC Practice','https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&w=200&q=80'],

      <h2>What carries over for free</h2>

      <ul>

      </ul>
      <h2>What ISO 27001 wants that SOC 2 didn't push hard on</h2>
      <h3>An information security management system, formally</h3>
      <p>SOC 2 lets you demonstrate operational controls. ISO 27001 wants the management system around them: policy, scope, leadership commitment, internal audit, management review.</p>
      <h3>A real risk assessment methodology</h3>
      <p>SOC 2 references risk; ISO 27001 wants a documented method, applied consistently, with a risk register tied to your statement of applicability.</p>
      <blockquote>The risk register is the document auditors flip to first. Make it real, make it short, and update it.</blockquote>
      <h3>Statement of Applicability</h3>

      <p>For a SOC 2 Type II-mature company with 100-300 employees, we typically deliver Stage 2 in five months from kickoff.</p>
      <div class="callout"><div class="ic">📋</div><div><strong>Want our SOC 2 → ISO 27001 mapping spreadsheet?</strong><br>Pre-built with 90+ controls cross-referenced. <a href="contact.html">Request the file →</a></div></div>

  'sast': {
    cat:'AppSec', read:'6 min read', date:'Published January 2026',
    title:'Why your SAST keeps missing business-logic flaws',
    lede:'SAST is excellent at finding patterns it has been taught. Business logic is, by definition, the part it has not. Here is how to fill the gap without doubling your AppSec spend.',
    author:['Priya Anand','Chief Threat Officer','https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?auto=format&fit=crop&w=200&q=80'],
    cover:'https://images.unsplash.com/photo-1542831371-29b0f74f9713?auto=format&fit=crop&w=1600&q=80',
    tags:['#appsec','#sast','#business-logic','#threat-modeling'],
    body:`
      <p>Pentests keep finding the same class of issues that your SAST never raises. Coupon codes that stack against the rules. Refund flows that issue value before the source charge clears. Step-up authentication that can be skipped by replaying an earlier session. SAST is not broken. It is being asked to do something it cannot do.</p>
      <h2>What SAST does well</h2>
      <p>Pattern matching against known dangerous primitives. SQL string concatenation. Unvalidated deserialization. Hard-coded credentials. For these, modern SAST is fast, cheap, and accurate.</p>
      <h2>Where it falls down</h2>
      <p>Business-logic flaws are not patterns. They are violations of intent. The code compiles, the tests pass, the scanner sees nothing wrong — but the flow does something the business never meant to allow:</p>
      <ul>
        <li>A discount code that is checked but not invalidated, allowing reuse</li>
        <li>A multi-step form that lets you submit step three without completing step two</li>
        <li>An API that accepts a <code>userId</code> in the body and trusts it instead of the session</li>
      </ul>
      <blockquote>Business logic vulnerabilities are not bugs in the code. They are mismatches between what the code does and what the business meant for it to do.</blockquote>

      <h2>1. The Patient Operator</h2>
      <p>Lives in your environment for months without doing anything that looks like an attack. Establishes multiple persistent footholds, harvests credentials, maps your trust relationships, waits for a strategic moment.</p>
      <p><strong>What they look like in telemetry:</strong> very low signal. Modest credential brute-force, occasional lateral movement that looks like normal admin behavior, slow exfil that does not trip volume thresholds. The hallmark is that nothing on its own is suspicious.</p>
      <p><strong>How to defend:</strong> long-window UEBA, periodic threat hunts targeted at "what changed in the last quarter," and aggressive credential rotation.</p>
